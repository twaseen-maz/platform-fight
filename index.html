<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aeris — Fighter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===================== CHARACTER SELECT SCREEN ===================== -->
  <div id="select-screen">

    <div class="select-bg-overlay"></div>

    <div class="select-content">
      <div class="select-title">
        <span class="title-line">CHOOSE YOUR</span>
        <span class="title-name">FIGHTER</span>
      </div>

      <div class="card-grid" id="card-grid">
        <!-- Character cards injected by JS -->
      </div>

      <div class="select-hint">Click a fighter to begin</div>
    </div>

  </div>

  <!-- ===================== GAME SCREEN ===================== -->
  <div id="game-screen" class="hidden">
    <canvas id="gameCanvas"></canvas>

    <div id="controls-hint">
      <span>← → Move</span>
      <span>Space / ↑ Jump</span>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
