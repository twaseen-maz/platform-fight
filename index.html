<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; color: #fff; font-family: monospace; margin: 20px; }
  canvas { border: 1px solid #444; display: block; margin: 10px 0; }
</style>
</head>
<body>
<h2>Aeris Idle Animation Debug</h2>
<canvas id="c" width="200" height="560"></canvas>
<div id="log"></div>
<script>
'use strict';

const log = document.getElementById('log');
function out(msg) {
  const d = document.createElement('div');
  d.textContent = msg;
  log.appendChild(d);
}

// ---- Exact copy of Animation class from game.js ----
class Animation {
  constructor(images, config) {
    this.images       = images;
    this.frameCount   = images.length;
    this.frameRate    = config.frameRate;
    this.loop         = config.loop;
    this.currentFrame = 0;
    this.elapsed      = 0;
    this.finished     = false;
  }
  get image()  { return this.images[this.currentFrame]; }
  get frameW() { return this.images[this.currentFrame].naturalWidth  || this.images[this.currentFrame].width; }
  get frameH() { return this.images[this.currentFrame].naturalHeight || this.images[this.currentFrame].height; }

  update(dt) {
    if (this.finished) return;
    this.elapsed += dt;
    const frameDuration = 1 / this.frameRate;
    while (this.elapsed >= frameDuration) {
      this.elapsed -= frameDuration;
      this.currentFrame++;
      if (this.currentFrame >= this.frameCount) {
        if (this.loop) { this.currentFrame = 0; }
        else { this.currentFrame = this.frameCount - 1; this.finished = true; break; }
      }
    }
  }

  draw(ctx, x, y, scale, flipX, feetOffY = 0.88) {
    const img = this.images[this.currentFrame];
    const sw  = img.naturalWidth  || img.width;
    const sh  = img.naturalHeight || img.height;
    const dw  = Math.round(sw * scale);
    const dh  = Math.round(sh * scale);
    const dx  = Math.round(x - dw / 2);
    const dy  = Math.round(y - dh * feetOffY);
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.globalCompositeOperation = 'source-over';
    if (flipX) { ctx.translate(x,0); ctx.scale(-1,1); ctx.translate(-x,0); }
    ctx.drawImage(img, 0, 0, sw, sh, dx, dy, dw, dh);
    ctx.restore();
  }
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Failed: ' + src));
    img.src = src;
  });
}

async function main() {
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  out('Loading 12 idle frames...');
  const images = await Promise.all(
    Array.from({length: 12}, (_, i) =>
      loadImage('aeris_idle/aeris_idle_' + String(i).padStart(2,'0') + '.png')
    )
  );
  out('Loaded ' + images.length + ' images');
  out('Frame 0 size: ' + images[0].naturalWidth + 'x' + images[0].naturalHeight);

  const anim = new Animation(images, { frameRate: 15, loop: true });

  let last = null;
  let ticks = 0;
  function loop(ts) {
    requestAnimationFrame(loop);
    const dt = last === null ? 0 : Math.min((ts - last) / 1000, 0.05);
    last = ts;

    anim.update(dt);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const scale = 220 / anim.frameH;
    anim.draw(ctx, canvas.width/2, canvas.height - 20, scale, false, 0.88);

    ctx.fillStyle = '#0f0';
    ctx.font = '11px monospace';
    ctx.fillText('frame: ' + anim.currentFrame + '/' + anim.frameCount, 4, 14);
    ctx.fillText('elapsed: ' + anim.elapsed.toFixed(3), 4, 28);
    ctx.fillText('dt: ' + dt.toFixed(4), 4, 42);

    ticks++;
    if (ticks <= 5) out('tick ' + ticks + ': frame=' + anim.currentFrame + ' dt=' + dt.toFixed(4));
  }
  requestAnimationFrame(loop);
}

main().catch(e => out('ERROR: ' + e.message));
</script>
</body>
</html>
